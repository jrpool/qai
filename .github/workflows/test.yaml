name: test

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies from the lockfile
        run: npm ci
      - name: Update dependencies to latest versions
        run: npm update
      - name: Run internal tests
        run: npm test
